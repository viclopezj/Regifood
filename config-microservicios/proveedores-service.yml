server:
  port: 0
  address: 0.0.0.0

spring:
  application:
    name: proveedores-service

  # CONFIGURACION DE credenciales de MYSQL
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  # CONFIGURACION DE SPRING CON MYSQL
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# URL de Eureka
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENTE_SERVICEURL_DEFAULTZONE}
  instance:
    # 1. Crea un ID unico que incluya un numero aleatorio para que no choquen
    instance-id: ${spring.application.name}:${random.value}
    # 2. Obliga a Eureka a mostrar el puerto real en su dashboard
    prefer-ip-address: true